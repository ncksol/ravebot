name: Test and Lint

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black
          cd apps/bot
          pip install -r requirements.txt
      
      - name: Run flake8
        run: |
          cd apps/bot
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      
      - name: Check formatting with black
        run: |
          cd apps/bot
          black --check --diff .

  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          cd apps/bot
          pip install -r requirements.txt
      
      - name: Run tests with pytest
        run: |
          cd apps/bot
          pytest -v --tb=short
        env:
          # Set dummy environment variables for tests
          ENVIRONMENT: dev
          BOT_TOKEN: dummy_token
          BOT_TOKEN_DEV: dummy_dev_token
          TEAMUP_API_KEY: dummy_api_key
          TEAMUP_API_KEY_DEV: dummy_dev_api_key
          TEAMUP_CALENDAR_KEY: dummy_calendar_key
          TEAMUP_CALENDAR_KEY_DEV: dummy_dev_calendar_key
          TEAMUP_CALENDAR_READER_KEY: dummy_reader_key
          TEAMUP_SUBCALENDAR_ID: dummy_subcalendar_id
          ADMIN_ID: 123456
          RA_QUERY_TEMPLATE_PATH: graphql_query_template.json
