name: Azure Deploy

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Test and Lint"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    name: Build and Deploy to Azure
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4

      - name: Determine next version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get latest release tag (e.g. v1.0.3), default to v0.0.0
          LATEST=$(gh release list --limit 1 --json tagName --jq '.[0].tagName // "v0.0.0"')
          echo "Latest release: $LATEST"

          # Increment patch version
          MAJOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f1)
          MINOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f2)
          PATCH=$(echo "$LATEST" | sed 's/v//' | cut -d. -f3)
          NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "Next version: $NEXT"
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ steps.version.outputs.version }} \
            --target ${{ github.sha }} \
            --title "${{ steps.version.outputs.version }}" \
            --generate-notes

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ravebotacr.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build \
            --build-arg APP_VERSION=${{ steps.version.outputs.version }} \
            -t ravebotacr.azurecr.io/ravebot:${{ github.sha }} \
            -t ravebotacr.azurecr.io/ravebot:latest \
            ./apps/bot
          docker push ravebotacr.azurecr.io/ravebot:${{ github.sha }}
          docker push ravebotacr.azurecr.io/ravebot:latest

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: ravebot-rg
          containerAppName: ravebot
          imageToDeploy: ravebotacr.azurecr.io/ravebot:${{ github.sha }}
