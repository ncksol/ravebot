name: Azure Deploy

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Test and Lint"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    name: Build and Deploy to Azure
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    env:
      RESOURCE_GROUP: ravebot-rg
      CONTAINER_APP_NAME: ravebot
      ACR_REGISTRY: ravebotacr.azurecr.io
      IMAGE_NAME: ravebot

    steps:
      - uses: actions/checkout@v4

      - name: Determine next version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get latest release tag (e.g. v1.0.3), default to v0.0.0
          LATEST=$(gh release list --limit 1 --json tagName --jq '.[0].tagName // "v0.0.0"')
          echo "Latest release: $LATEST"

          # Increment patch version
          MAJOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f1)
          MINOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f2)
          PATCH=$(echo "$LATEST" | sed 's/v//' | cut -d. -f3)
          NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "Next version: $NEXT"
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Validate deployment prerequisites
        env:
          ANNOUNCEMENT_CHAT_ID: ${{ secrets.ANNOUNCEMENT_CHAT_ID }}
        run: |
          if [ -z "$ANNOUNCEMENT_CHAT_ID" ]; then
            echo "::error::ANNOUNCEMENT_CHAT_ID secret is required for production announcement updates"
            exit 1
          fi
          echo "ANNOUNCEMENT_CHAT_ID is configured"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ steps.version.outputs.version }} \
            --target ${{ github.sha }} \
            --title "${{ steps.version.outputs.version }}" \
            --generate-notes

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build \
            --build-arg APP_VERSION=${{ steps.version.outputs.version }} \
            -t ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            ./apps/bot
          docker push ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: ${{ env.CONTAINER_APP_NAME }}
          imageToDeploy: ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          environmentVariables: >-
            ANNOUNCEMENT_CHAT_ID=${{ secrets.ANNOUNCEMENT_CHAT_ID }}
            ANNOUNCEMENT_INTERVAL_SECONDS=3600
            ANNOUNCEMENT_FIRST_RUN_SECONDS=60
